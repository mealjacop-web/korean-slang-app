  {word:"개소리",roman:"gae-so-ri",meaning:"헛소리 → 'BS / total nonsense'",example:{kor:"개소리 하지 마",eng:"Stop talking BS"},note:"개+소리. 말도 안 되는 소리에 씀.",cats:["욕설","일상"],nsfw:true,free:false},
  {word:"ㅗ",roman:"bbong",meaning:"욕하는 손가락 이모티콘 → 'Middle finger emoji'",example:{kor:"ㅗ ㅗ",eng:"*middle fingers*"},note:"채팅에서 욕 대신 쓰는 기호.",cats:["욕설","인터넷"],nsfw:true,free:false},
];

const allCats = ["전체","무료","욕설","숏폼","K-POP","드라마","인터넷","일상","학교","사회"];
let activeCat = "전체";
let isPro = false;

function initCats(){
  const el = document.getElementById("cats");
  el.innerHTML = allCats.map(c=>`<div class="cat${c===activeCat?' active':''}" onclick="setCat('${c}')">${c}</div>`).join("");
}

function setCat(c){activeCat=c;initCats();render();}

function render(){
  const q = document.getElementById("searchInput").value.toLowerCase();
  let filtered = data.filter(d=>{
    if(activeCat==="무료") return d.free;
    const matchCat = activeCat==="전체" || d.cats.includes(activeCat);
    const matchQ = !q || d.word.includes(q) || d.roman.includes(q) || d.meaning.toLowerCase().includes(q);
    return matchCat && matchQ;
  });

  const el = document.getElementById("list");
  if(!filtered.length){el.innerHTML='<div class="empty">검색 결과 없음</div>';return;}

  let html = "";
  let shownLockBanner = false;

  filtered.forEach(d=>{
    const locked = !isPro && !d.free;
    if(locked && !shownLockBanner){
      shownLockBanner = true;
      html += `<div class="lock-banner">
        <h3>🔒 PRO 전용 콘텐츠</h3>
        <p>NSFW 욕설, K-POP 팬덤 슬랭, 드라마 표현 등<br>실제 한국인이 쓰는 모든 표현을 잠금해제하세요</p>
        <button class="lock-btn" onclick="unlockPro()">PRO 시작하기 · $4.99/월</button>
      </div>`;
    }
    html += `<div class="card${locked?' locked':''}" onclick="${locked?'':'openDetail('+data.indexOf(d)+')'}">
      <div class="card-top">
        <div class="word">${locked?'🔒 ???':d.word}${d.free?'<span class="free-badge">FREE</span>':''}</div>
        <div class="badge ${d.nsfw?'nsfw':locked?'lock':'normal'}">${d.nsfw?'NSFW':locked?'PRO':'일반'}</div>
      </div>
      <div class="roman">${locked?'잠금됨':d.roman}</div>
      <div class="meaning">${locked?'PRO 플랜으로 확인하세요':d.meaning.split('→')[1]||d.meaning}</div>
      <div class="tags">${d.cats.map(c=>`<span class="tag">${c}</span>`).join("")}</div>
    </div>`;
  });

  el.innerHTML = html;
}

function unlockPro(){
  alert("결제 기능 준비 중이에요! 곧 오픈합니다 🔥");
}

function openDetail(i){
  const d = data[i];
  if(!isPro && !d.free) return;
  document.getElementById("d-word").textContent = d.word;
  document.getElementById("d-roman").textContent = d.roman;
  document.getElementById("d-meaning").textContent = d.meaning;
  document.getElementById("d-example").innerHTML = `<div class="bubble"><div class="kor">${d.example.kor}</div><div class="eng">${d.example.eng}</div></div>`;
  document.getElementById("d-note").textContent = d.note;
  document.getElementById("detail").style.display = "block";
  window.scrollTo(0,0);
}

function closeDetail(){document.getElementById("detail").style.display="none";}

initCats();render();
</script>
</body>
</html>
