.travel-card{background:#1a1a1a;border-radius:14px;padding:14px;margin-bottom:8px;border:1px solid #2a2a2a;display:flex;justify-content:space-between;align-items:center}
.travel-left{}

<body>

<div class="header">
  <h1>MZ Slang Dictionary 🔥</h1>

<div class="tabs">
  <div class="tab active" onclick="showTab('dict')">Dictionary</div>

</div>

<!-- DICTIONARY -->
<div id="dict" class="page active">

  <div class="cats" id="cats"></div>
  <div class="list" id="list"></div>
</div>

<!-- QUIZ -->
<div id="quiz" class="page">

    <div class="quiz-source" id="quizSources"></div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

  </div>
</div>

<!-- TRAVEL -->
<div id="travel" class="page">
  <div class="travel-wrap">
    <div class="travel-cat" id="travelCats"></div>
    <div id="travelList"></div>
  </div>
</div>

<!-- DETAIL -->
<div class="detail" id="detail">

    <span class="back" onclick="closeDetail()">← Back</span>
    <div class="detail-word" id="d-word"></div>

    <div class="detail-pronounce" id="d-pronounce"></div>
    <button class="speak-big" id="d-speak" onclick="speakWord()">🔊 Hear it in Korean</button>
    <div class="section"><div class="section-label">Meaning</div><div class="section-text" id="d-meaning"></div></div>
    <div class="section"><div class="section-label">Example</div><div id="d-example"></div></div>
    <div class="section"><div class="section-label">Warning</div><div class="section-text" id="d-note"></div></div>
  </div>
</div>

<script>
// TTS
function speak(text, rate=0.85){
  const u=new SpeechSynthesisUtterance(text);
  u.lang='ko-KR'; u.rate=rate;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}
let currentWord='';
function speakWord(){speak(currentWord);}

const allCats=["All","Free","Profanity","Shorts","K-POP","Drama","Internet","Everyday","School"];
let activeCat="All";
let isPro=false;
let currentDetailWord='';

function showTab(t){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(p=>p.classList.remove('active'));
  document.getElementById(t).classList.add('active');
  ['dict','quiz','travel'].forEach((n,i)=>{if(n===t)document.querySelectorAll('.tab')[i].classList.add('active');});
  if(t==='quiz')initQuiz();
  if(t==='travel')renderTravel();
}

function initCats(){
  document.getElementById("cats").innerHTML=allCats.map(c=>`<div class="cat${c===activeCat?' active':''}" onclick="setCat('${c}')">${c}</div>`).join("");
}
function setCat(c){activeCat=c;initCats();renderDict();}

function renderDict(){
  const q=document.getElementById("searchInput").value.toLowerCase();
  let filtered=slangData.filter(d=>{
    if(activeCat==="Free")return d.free;
    const matchCat=activeCat==="All"||d.cats.includes(activeCat);
    const matchQ=!q||d.word.includes(q)||d.roman.includes(q)||d.meaning.toLowerCase().includes(q);
    return matchCat&&matchQ;
  });
  const el=document.getElementById("list");
  if(!filtered.length){el.innerHTML='<div style="text-align:center;padding:40px;color:#555">No results found</div>';return;}
  let html="";let shown=false;
  filtered.forEach(d=>{
    const locked=!isPro&&!d.free;
    if(locked&&!shown){shown=true;html+=`<div class="lock-banner"><h3>🔒 PRO Content</h3><p>Unlock all NSFW slang, K-POP fandom terms,<br>drama expressions & more</p><button class="lock-btn" onclick="alert('Payment coming soon! 🔥')">Start PRO · $4.99/month</button></div>`;}
    html+=`<div class="card${locked?' locked':''}" onclick="${locked?'':'openDetail('+slangData.indexOf(d)+')'}">
      <div class="card-top"><div class="word">${locked?'🔒 ???':d.word}${d.free?'<span class="free-badge">FREE</span>':''}</div>
      <div class="badge ${d.nsfw?'nsfw':locked?'pro':'normal'}">${d.nsfw?'NSFW':locked?'PRO':'General'}</div></div>
      <div class="roman">${locked?'Locked':d.roman}</div>
      <div class="pronounce">${locked?'':d.pronounce}</div>
      <div class="meaning">${locked?'Unlock with PRO plan':d.meaning}</div>
      <div class="tags">
        ${d.cats.map(c=>`<span class="tag">${c}</span>`).join("")}
        ${!locked?`<button class="speak-btn" onclick="event.stopPropagation();speak('${d.word}')">🔊</button>`:''}
      </div></div>`;
  });
  el.innerHTML=html;
}

function openDetail(i){
  const d=slangData[i];
  if(!isPro&&!d.free)return;
  currentDetailWord=d.word;
  document.getElementById("d-word").textContent=d.word;
  document.getElementById("d-roman").textContent=d.roman;
  document.getElementById("d-pronounce").textContent='🗣️ '+d.pronounce;
  document.getElementById("d-meaning").textContent=d.meaning;
  document.getElementById("d-example").innerHTML=`<div class="bubble"><div class="kor">${d.example.kor}</div><div class="eng">${d.example.eng}</div></div>`;
  document.getElementById("d-note").textContent=d.note;
  document.getElementById("detail").style.display="block";
  window.scrollTo(0,0);
}
function speakWord(){speak(currentDetailWord);}
function closeDetail(){document.getElementById("detail").style.display="none";}

// Travel
let activeTravelCat="All";
function renderTravel(){
  const cats=["All",...travelData.map(t=>t.cat)];
  document.getElementById("travelCats").innerHTML=cats.map(c=>`<div class="cat${c===activeTravelCat?' active':''}" onclick="setTravelCat('${c}')">${c}</div>`).join("");
  const filtered=activeTravelCat==="All"?travelData:travelData.filter(t=>t.cat===activeTravelCat);
  document.getElementById("travelList").innerHTML=filtered.map(section=>`
    <div class="travel-section">
      <div class="travel-section-title">${section.cat}</div>
      ${section.items.map(item=>`
        <div class="travel-card">
          <div class="travel-left">
            <div class="travel-korean">${item.kor}</div>
            <div class="travel-roman">${item.roman}</div>
            <div class="travel-pronounce">🗣️ ${item.pronounce}</div>
            <div class="travel-meaning">${item.meaning}</div>
            <div style="color:#666;font-size:11px;margin-top:3px">💡 ${item.tip}</div>
          </div>
          <button class="travel-speak" onclick="speak('${item.kor}',0.7)">🔊</button>
        </div>`).join("")}
    </div>`).join("");
}
function setTravelCat(c){activeTravelCat=c;renderTravel();}

// Quiz
const sources=["All","Drama","K-POP","Meme"];
let activeSource="All",quizList=[],qIndex=0,score=0,answered=false;
function initQuiz(){
  document.getElementById("quizSources").innerHTML=sources.map(s=>`<div class="src-btn${s===activeSource?' active':''}" onclick="setSource('${s}')">${s}</div>`).join("");
  loadQuiz();
}
function setSource(s){activeSource=s;initQuiz();}
function loadQuiz(){
  quizList=activeSource==="All"?[...quizData]:quizData.filter(q=>q.source===activeSource);
  quizList.sort(()=>Math.random()-0.5);
  qIndex=0;score=0;answered=false;renderQuiz();
}
function renderQuiz(){
  const fill=Math.round((qIndex/quizList.length)*100);
  document.getElementById("progressFill").style.width=fill+"%";
  if(qIndex>=quizList.length){
    document.getElementById("quizArea").innerHTML=`<div class="quiz-score">
      <h2>Quiz Complete! 🎉</h2>
      <div class="score-num">${score}/${quizList.length}</div>
      <p style="color:#aaa;font-size:14px;margin-bottom:16px">${score===quizList.length?'Perfect! You are a true MZ master!':score>=quizList.length/2?'Great job! Keep studying!':'Try again — you got this!'}</p>
      <button class="restart-btn" onclick="loadQuiz()">Try Again 🔥</button></div>`;
    return;
  }
  const q=quizList[qIndex];
  const typeClass=q.type==='drama'?'type-drama':q.type==='kpop'?'type-kpop':'type-meme';
  const typeLabel=q.type==='drama'?'Drama':q.type==='kpop'?'K-POP':'Meme';
  const highlighted=q.sentence.replace(q.highlight,`<span class="cinema-highlight">${q.highlight}</span>`);
  document.getElementById("quizArea").innerHTML=`
    <div class="cinema-card">
      <div class="cinema-top">
        <div class="cinema-show">${q.show}</div>
        <a class="cinema-yt" href="${q.ytUrl}" target="_blank">▶ YouTube</a>
      </div>
      <div class="cinema-scene">${q.scene}</div>
      <div class="cinema-screen">
        <div class="cinema-subtitle">${highlighted}</div>
        <div class="cinema-eng">"${q.translation}"</div>
      </div>
      <div class="cinema-bottom">
        <div class="cinema-ep">${q.episode}</div>
        <div class="cinema-type ${typeClass}">${typeLabel}</div>
      </div>
    </div>
    <div style="color:#888;font-size:12px;margin-bottom:10px;padding:0 4px">What does <span style="color:#FFE600;font-weight:700">${q.highlight}</span> mean?</div>
    <div class="options">
      ${q.options.map((o,i)=>`<button class="option" onclick="selectAnswer(${i})">${o}</button>`).join("")}
    </div>
    <div class="result-msg" id="resultMsg"></div>
    <div class="explanation-box" id="explanation"><div class="exp-label">💡 Explanation</div><div class="exp-text">${q.explanation}</div></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Question →</button>`;
}
function selectAnswer(i){
  if(answered)return;
  answered=true;
  const q=quizList[qIndex];
  const opts=document.querySelectorAll('.option');
  const correct=q.options.indexOf(q.answer);
  const msg=document.getElementById("resultMsg");
  if(i===correct){opts[i].classList.add('correct');msg.textContent="Correct! 🎉 +1 point";msg.className="result-msg correct";score++;}
  else{opts[i].classList.add('wrong');opts[correct].classList.add('correct');msg.textContent="Wrong 😅 Check the correct answer";msg.className="result-msg wrong";}
  msg.style.display="block";
  document.getElementById("explanation").style.display="block";
  document.getElementById("nextBtn").style.display="block";
}
function nextQuestion(){qIndex++;answered=false;renderQuiz();}

initCats();renderDict();
</script>
