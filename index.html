<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MZ 슬랭 사전</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0f0f;color:#fff;font-family:-apple-system,sans-serif;max-width:430px;margin:0 auto}
.header{padding:16px;background:#0f0f0f;position:sticky;top:0;z-index:10;border-bottom:1px solid #222}
.header h1{font-size:20px;font-weight:800}
.header p{font-size:11px;color:#888;margin-top:2px}
.tabs{display:flex;background:#0f0f0f;border-bottom:1px solid #222}
.tab{flex:1;padding:12px;text-align:center;font-size:13px;color:#666;cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:#FF2D55;border-bottom:2px solid #FF2D55}
.page{display:none;padding:0}
.page.active{display:block}

/* 단어장 */
.search{margin:12px 16px}
.search input{width:100%;padding:10px 16px;background:#1a1a1a;border:1px solid #333;border-radius:12px;color:#fff;font-size:14px;outline:none}
.search input::placeholder{color:#555}
.cats{display:flex;gap:8px;padding:0 16px 12px;overflow-x:auto}
.cats::-webkit-scrollbar{display:none}
.cat{padding:6px 14px;border-radius:20px;border:1px solid #333;background:#1a1a1a;color:#aaa;font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.cat.active{background:#FF2D55;border-color:#FF2D55;color:#fff}
.list{padding:0 16px}
.card{background:#1a1a1a;border-radius:16px;padding:16px;margin-bottom:10px;border:1px solid #2a2a2a;cursor:pointer}
.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.word{font-size:22px;font-weight:800}
.badge{font-size:10px;padding:3px 8px;border-radius:10px;font-weight:600}
.nsfw{background:#FF2D55;color:#fff}
.normal{background:#30D158;color:#fff}
.pro{background:#FFB800;color:#000}
.roman{color:#888;font-size:12px;margin-bottom:4px}
.meaning{color:#ccc;font-size:13px}
.tags{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.tag{background:#242424;border:1px solid #333;border-radius:8px;padding:3px 8px;color:#aaa;font-size:10px}
.lock-banner{background:#1a1a1a;border:1px solid #FF2D55;border-radius:16px;padding:20px;margin:10px 16px;text-align:center}
.lock-banner h3{color:#FF2D55;font-size:16px;margin-bottom:8px}
.lock-banner p{color:#aaa;font-size:12px;line-height:1.6;margin-bottom:14px}
.lock-btn{background:#FF2D55;color:#fff;border:none;border-radius:12px;padding:12px 24px;font-size:14px;font-weight:700;cursor:pointer;width:100%}
.free-badge{background:#1a1a1a;border:1px solid #30D158;border-radius:8px;padding:2px 8px;color:#30D158;font-size:10px;margin-left:6px}

/* 상세 */
.detail{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#0f0f0f;z-index:100;overflow-y:auto;max-width:430px;margin:0 auto}
.detail-inner{padding:20px 16px}
.back{color:#FF2D55;font-size:14px;cursor:pointer;margin-bottom:16px;display:block}
.detail-word{font-size:40px;font-weight:800;margin-bottom:4px}
.detail-roman{color:#888;font-size:14px;margin-bottom:16px}
.section{background:#1a1a1a;border-radius:14px;padding:14px;margin-bottom:12px;border:1px solid #2a2a2a}
.section-label{color:#888;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.section-text{color:#eee;font-size:14px;line-height:1.6}
.bubble{background:#FF2D55;border-radius:12px 12px 12px 2px;padding:10px 14px;margin-bottom:8px}
.bubble .kor{color:#fff;font-size:14px;font-weight:600;margin-bottom:2px}
.bubble .eng{color:rgba(255,255,255,0.8);font-size:12px}

/* 퀴즈 */
.quiz-wrap{padding:16px}
.quiz-header{margin-bottom:16px}
.quiz-source{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.src-btn{padding:6px 14px;border-radius:20px;border:1px solid #333;background:#1a1a1a;color:#aaa;font-size:12px;cursor:pointer;white-space:nowrap}
.src-btn.active{background:#FF2D55;border-color:#FF2D55;color:#fff}
.progress-bar{background:#222;border-radius:4px;height:4px;margin-bottom:16px}
.progress-fill{background:#FF2D55;height:4px;border-radius:4px;transition:width 0.3s}
.quiz-card{background:#1a1a1a;border-radius:16px;padding:20px;margin-bottom:16px;border:1px solid #2a2a2a;text-align:center}
.quiz-source-tag{font-size:11px;color:#FF2D55;margin-bottom:8px;font-weight:600}
.quiz-scene{font-size:12px;color:#888;margin-bottom:12px;font-style:italic;line-height:1.5}
.quiz-sentence{font-size:18px;font-weight:700;color:#fff;line-height:1.5;margin-bottom:4px}
.quiz-sentence span.highlight{color:#FF2D55;border-bottom:2px solid #FF2D55}
.quiz-eng{font-size:12px;color:#666;margin-top:6px}
.options{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.option{background:#1a1a1a;border:1px solid #333;border-radius:12px;padding:14px 16px;color:#ddd;font-size:14px;cursor:pointer;text-align:left;transition:all 0.15s;width:100%}
.option:hover{background:#242424}
.option.correct{border-color:#30D158;background:rgba(48,209,88,0.1);color:#30D158}
.option.wrong{border-color:#FF2D55;background:rgba(255,45,85,0.1);color:#FF2D55}
.result-msg{text-align:center;padding:12px;font-size:14px;font-weight:600;border-radius:12px;margin-bottom:12px;display:none}
.result-msg.correct{background:rgba(48,209,88,0.1);color:#30D158}
.result-msg.wrong{background:rgba(255,45,85,0.1);color:#FF2D55}
.next-btn{background:#FF2D55;color:#fff;border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:700;cursor:pointer;width:100%;display:none}
.quiz-score{background:#1a1a1a;border-radius:16px;padding:24px;text-align:center;border:1px solid #2a2a2a;display:none}
.quiz-score h2{font-size:24px;font-weight:800;margin-bottom:8px}
.quiz-score p{color:#aaa;font-size:14px;margin-bottom:16px}
.restart-btn{background:#FF2D55;color:#fff;border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:700;cursor:pointer;width:100%}
.score-num{font-size:48px;font-weight:800;color:#FF2D55;margin:12px 0}
</style>
</head>
<body>

<div class="header">
  <h1>MZ 슬랭 사전 🔥</h1>
  <p>실제 한국인이 쓰는 말</p>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('dict')">단어장</div>
  <div class="tab" onclick="showTab('quiz')">퀴즈</div>
</div>

<!-- 단어장 -->
<div id="dict" class="page active">
  <div class="search"><input type="text" id="searchInput" placeholder="검색..." oninput="renderDict()"></div>
  <div class="cats" id="cats"></div>
  <div class="list" id="list"></div>
</div>

<!-- 퀴즈 -->
<div id="quiz" class="page">
  <div class="quiz-wrap">
    <div class="quiz-source" id="quizSources"></div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div id="quizArea"></div>
  </div>
</div>

<!-- 상세 -->
<div class="detail" id="detail">
  <div class="detail-inner">
    <span class="back" onclick="closeDetail()">← 뒤로</span>
    <div class="detail-word" id="d-word"></div>
    <div class="detail-roman" id="d-roman"></div>
    <div class="section"><div class="section-label">뜻</div><div class="section-text" id="d-meaning"></div></div>

    <div class="section"><div class="section-label">주의</div><div class="section-text" id="d-note"></div></div>
  </div>
</div>

    answer:"전설적이다 / legendary / iconic",
    options:["전설적이다 / legendary / iconic","재미없다 / boring","오래됐다 / old","평범하다 / ordinary"],
    explanation:"레전드 = legend 한국식 발음. 유튜브, 틱톡 댓글에서 엄청난 콘텐츠에 무조건 달리는 댓글이에요."
  },
];

// 단어장
const allCats = ["전체","무료","욕설","숏폼","K-POP","드라마","인터넷","일상","학교"];
let activeCat = "전체";
let isPro = false;

function showTab(t){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(p=>p.classList.remove('active'));
  document.getElementById(t).classList.add('active');
  const tabs = ['dict','quiz'];
  document.querySelectorAll('.tab')[tabs.indexOf(t)].classList.add('active');
  if(t==='quiz') initQuiz();
}

function initCats(){
  document.getElementById("cats").innerHTML = allCats.map(c=>`<div class="cat${c===activeCat?' active':''}" onclick="setCat('${c}')">${c}</div>`).join("");
}
function setCat(c){activeCat=c;initCats();renderDict();}

function renderDict(){
  const q = document.getElementById("searchInput").value.toLowerCase();
  let filtered = slangData.filter(d=>{
    if(activeCat==="무료") return d.free;
    const matchCat = activeCat==="전체"||d.cats.includes(activeCat);
    const matchQ = !q||d.word.includes(q)||d.roman.includes(q)||d.meaning.toLowerCase().includes(q);
    return matchCat&&matchQ;
  });
  const el = document.getElementById("list");
  if(!filtered.length){el.innerHTML='<div style="text-align:center;padding:40px;color:#555">검색 결과 없음</div>';return;}
  let html=""; let shown=false;
  filtered.forEach(d=>{
    const locked=!isPro&&!d.free;
    if(locked&&!shown){shown=true;html+=`<div class="lock-banner"><h3>🔒 PRO 전용 콘텐츠</h3><p>NSFW 욕설, K-POP 팬덤 슬랭, 드라마 표현 등<br>실제 한국인이 쓰는 모든 표현 잠금해제</p><button class="lock-btn" onclick="alert('결제 기능 준비 중! 곧 오픈합니다 🔥')">PRO 시작하기 · $4.99/월</button></div>`;}
    html+=`<div class="card${locked?' locked':''}" onclick="${locked?'':'openDetail('+slangData.indexOf(d)+')'}">
      <div class="card-top"><div class="word">${locked?'🔒 ???':d.word}${d.free?'<span class="free-badge">FREE</span>':''}</div>
      <div class="badge ${d.nsfw?'nsfw':locked?'pro':'normal'}">${d.nsfw?'NSFW':locked?'PRO':'일반'}</div></div>
      <div class="roman">${locked?'잠금됨':d.roman}</div>
      <div class="meaning">${locked?'PRO 플랜으로 확인하세요':d.meaning.split('→')[1]||d.meaning}</div>
      <div class="tags">${d.cats.map(c=>`<span class="tag">${c}</span>`).join("")}</div></div>`;
  });
  el.innerHTML=html;
}

function openDetail(i){
  const d=slangData[i];
  if(!isPro&&!d.free)return;
  document.getElementById("d-word").textContent=d.word;
  document.getElementById("d-roman").textContent=d.roman;
  document.getElementById("d-meaning").textContent=d.meaning;
  document.getElementById("d-example").innerHTML=`<div class="bubble"><div class="kor">${d.example.kor}</div><div class="eng">${d.example.eng}</div></div>`;
  document.getElementById("d-note").textContent=d.note;
  document.getElementById("detail").style.display="block";
  window.scrollTo(0,0);
}
function closeDetail(){document.getElementById("detail").style.display="none";}

// 퀴즈
const sources=["전체","드라마","K-POP","밈/숏폼"];
let activeSource="전체";
let quizList=[];
let qIndex=0;
let score=0;
let answered=false;

function initQuiz(){
  document.getElementById("quizSources").innerHTML=sources.map(s=>`<div class="src-btn${s===activeSource?' active':''}" onclick="setSource('${s}')">${s}</div>`).join("");
  loadQuiz();
}
function setSource(s){activeSource=s;initQuiz();}
function loadQuiz(){
  quizList = activeSource==="전체" ? [...quizData] : quizData.filter(q=>q.source===activeSource);
  quizList.sort(()=>Math.random()-0.5);
  qIndex=0; score=0; answered=false;
  renderQuiz();
}
function renderQuiz(){
  const fill = Math.round((qIndex/quizList.length)*100);
  document.getElementById("progressFill").style.width=fill+"%";
  if(qIndex>=quizList.length){
    document.getElementById("quizArea").innerHTML=`
      <div class="quiz-score" style="display:block">
        <h2>퀴즈 완료! 🎉</h2>
        <div class="score-num">${score}/${quizList.length}</div>
        <p>${score===quizList.length?'완벽해요! 진짜 MZ 고수!':score>=quizList.length/2?'잘했어요! 조금만 더 공부하면 완벽!':'한 번 더 도전해봐요!'}</p>
        <button class="restart-btn" onclick="loadQuiz()">다시 도전하기 🔥</button>
      </div>`;
    return;
  }
  const q=quizList[qIndex];
  const highlighted=q.sentence.replace(q.highlight,`<span class="highlight">${q.highlight}</span>`);
  document.getElementById("quizArea").innerHTML=`
    <div class="quiz-card">
      <div class="quiz-source-tag">${q.source} · ${q.show}</div>
      <div class="quiz-scene">${q.scene}</div>
      <div class="quiz-sentence">${highlighted}</div>
      <div class="quiz-eng">"${q.translation}"</div>
    </div>
    <div style="color:#888;font-size:12px;margin-bottom:10px;padding:0 4px">밑줄 친 <span style="color:#FF2D55;font-weight:700">${q.highlight}</span> 의 뜻은?</div>
    <div class="options" id="options">
      ${q.options.map((o,i)=>`<button class="option" onclick="selectAnswer(${i})">${o}</button>`).join("")}
    </div>
    <div class="result-msg" id="resultMsg"></div>
    <div style="background:#1a1a1a;border-radius:12px;padding:12px;margin-bottom:12px;display:none" id="explanation">
      <div style="color:#888;font-size:11px;margin-bottom:4px">해설</div>
      <div style="color:#eee;font-size:13px;line-height:1.6">${q.explanation}</div>
    </div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">다음 문제 →</button>
  `;
}
function selectAnswer(i){
  if(answered)return;
  answered=true;
  const q=quizList[qIndex];
  const opts=document.querySelectorAll('.option');
  const correct=q.options.indexOf(q.answer);
  const msg=document.getElementById("resultMsg");
  const exp=document.getElementById("explanation");
  if(i===correct){
    opts[i].classList.add('correct');
    msg.textContent="정답! 🎉 +1점";
    msg.className="result-msg correct";
    score++;
  } else {
    opts[i].classList.add('wrong');
    opts[correct].classList.add('correct');
    msg.textContent="오답 😅 정답을 확인하세요";
    msg.className="result-msg wrong";
  }
  msg.style.display="block";
  exp.style.display="block";
  document.getElementById("nextBtn").style.display="block";
}
function nextQuestion(){qIndex++;answered=false;renderQuiz();}

initCats();renderDict();
</script>
</body>
</html>
